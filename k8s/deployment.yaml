apiVersion: apps/v1
kind: Deployment
metadata:
  name: semtech-project
  labels:
    app: semtech-project
spec:
  replicas: 3
  selector:
    matchLabels:
      app: semtech-project
  template:
    metadata:
      labels:
        app: semtech-project
    spec:
      containers:
        - name: semtech-project
          # This line is updated automatically by the CI pipeline after every
          # successful main-branch build. Do not edit manually.
          image: 348165962256.dkr.ecr.us-east-1.amazonaws.com/semtech_demo_image:main-aae6fcc-22
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: semtech-service
  labels:
    app: semtech-project
spec:
  type: ClusterIP
  selector:
    app: semtech-project
  ports:
    - name: http
      protocol: TCP
      port: 80           # external port (browser-facing, no :port needed)
      targetPort: 8080   # Spring Boot app port inside the container
